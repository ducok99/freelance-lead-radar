packages:
  - "apps/*"
  - "workers/*"
  - "packages/*"

# pnpm 10.28: mọi lifecycle script của dependency phải được duyệt rõ ràng.
# esbuild và workerd cần script để cung cấp binary theo nền tảng; sharp là
# dependency tùy chọn của Wrangler và P4 không dùng tính năng cần script đó.
allowBuilds:
  esbuild: true
  sharp: false
  workerd: true
strictDepBuilds: true
