name: CI

on:
  push:
    branches: [main]
  pull_request:

# Quyền tối thiểu: chỉ đọc code, không ghi gì lên repo.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      # Tránh action runtime Node.js 20 đã deprecated; version pnpm vẫn khóa
      # đúng với packageManager trong package.json.
      - name: Cài pnpm
        run: npm install --global pnpm@10.28.0

      - name: Cài dependencies
        run: pnpm install --frozen-lockfile

      - name: Chặn secret trong repo (SECURITY.md §6)
        run: pnpm check-secrets

      - name: Chặn Facebook bot/proxy trong Workers (SECURITY.md §3)
        run: pnpm check-api-safety

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (kèm rule an toàn SECURITY.md §3)
        run: pnpm lint

      - name: Unit + contract tests
        run: pnpm test

      - name: Coverage rules-engine >= 90% + adapter/API/extension >= 80%
        run: pnpm test:coverage

      - name: Build Chrome Extension MV3
        run: pnpm --filter @flr/extension build

      - name: Cài Chromium cho kiểm thử Extension
        run: pnpm --filter @flr/extension exec playwright install --with-deps chromium

      - name: E2E nhóm ngoài allowlist không tạo lead
        run: pnpm --filter @flr/extension e2e
